version: '3.9'

services:
  # ── MySQL ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: loanai_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: loanai_root
      MYSQL_USER: loanai
      MYSQL_PASSWORD: loanai_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loanai_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://loanai:loanai_pass@mysql/loanai_users
      DATABASE_URL_LOANS: mysql+pymysql://loanai:loanai_pass@mysql/loanai_loans
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_SITE_URL: http://localhost:5173
      OPENROUTER_SITE_NAME: LoanAI
      FRONTEND_URL: http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  # ── Frontend (Vite dev server) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: loanai_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      VITE_OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql_data:
